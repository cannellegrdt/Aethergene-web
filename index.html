<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Aethergene</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d1117;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0d1117;
      z-index: 100;
    }
    #loading h1 { font-size: 2rem; color: #58a6ff; }
    #loading p  { color: #8b949e; }
  </style>
<link rel="modulepreload" href="/Aethergene-web/Aethergene-e8673378384703d.js" crossorigin="anonymous" integrity="sha384-sbKYFC/XWWkOmTFl35r5X/DCqt1+lX59QmH1OFF4t7VigEJ7kelSMVF6vUqWjS0L"><link rel="preload" href="/Aethergene-web/Aethergene-e8673378384703d_bg.wasm" crossorigin="anonymous" integrity="sha384-pcBF5v0IEFx4b2at+7Ffg565LRqNxXYiO9DQJjSW3fjkGm/xy7yTvhh4c2HqaybT" as="fetch" type="application/wasm"></head>
<body>
  <div id="loading">
    <h1>Aethergene</h1>
    <p>Loading simulation engine…</p>
  </div>

  <canvas id="aethergene_canvas"></canvas>

  <script>
    // Cacher le loader dès que le canvas a une vraie taille
    const observer = new ResizeObserver(entries => {
      for (const entry of entries) {
        if (entry.contentRect.height > 100) {
          document.getElementById('loading').style.display = 'none';
          observer.disconnect();
        }
      }
    });
    observer.observe(document.getElementById('aethergene_canvas'));

    // Fallback : cacher après 5 secondes quoi qu'il arrive
    setTimeout(() => {
      const l = document.getElementById('loading');
      if (l) l.style.display = 'none';
    }, 5000);
  </script>

  
<script type="module">
import init, * as bindings from '/Aethergene-web/Aethergene-e8673378384703d.js';
const wasm = await init({ module_or_path: '/Aethergene-web/Aethergene-e8673378384703d_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
</body>
</html>
